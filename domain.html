<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Domain - Cognix</title>
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-blue: #0088ff;
            --dark-bg: #03050a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* -------------------------------------
           Background Holographic HUD Effects
           ------------------------------------- */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .ai-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            perspective: 1000px;
            transform-style: preserve-3d;
            transform: rotateX(60deg) translateY(100px) scale(3);
            transform-origin: bottom center;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* -------------------------------------
           UI Layout Structure
           ------------------------------------- */
        .content-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Forces top-down rendering to prevent the video from ever overlapping upward into the heading */
            align-items: center;
        }

        /* 1. Dynamic Heading */
        .domain-heading {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90%;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 40px rgba(0, 255, 255, 0.3);
            opacity: 0;
            margin: 0;
            line-height: 1.2;
            z-index: 20; /* Ensures the glowing text always stays cleanly above */
        }

        .highlight-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0,255,255,0.8);
        }

        /* 2. Video Player */
        .video-box {
            position: relative;
            width: 90%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.05);
            overflow: hidden;
            display: none; /* revealed via GSAP */
            opacity: 0;
            margin-top: 26vh; /* Pushed down to leave the entire top 25% of the screen free for the heading */
            max-height: 55vh; /* Dynamically prevents the video pushing the buttons out of the fixed screen bounds */
            z-index: 15;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        ビデオ, video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        /* 3. Keeping Watching Text */
        .keep-watching {
            margin-top: 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            opacity: 0;
            display: none;
            animation: pulse-op 2s infinite;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 4. Action Button */
        .back-btn {
            position: absolute;
            bottom: 15%;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: #fff;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            opacity: 0;
            display: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 8px #fff;
        }

        @media (max-width: 768px) {
            .video-box {
                width: 95%;
                margin-top: 22vh; /* Give adequate room on smaller phone screens as well */
                max-height: 50vh;
            }
            .domain-heading {
                top: 40%;
            }
            .back-btn {
                bottom: 10%;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ai-grid"></div>

    <div class="content-layer">
        
        <!-- Big Animated Heading -->
        <h1 class="domain-heading" id="mainHeading">
            Ready for <br><span class="highlight-text" id="domainName">Domain</span>
        </h1>

        <!-- Video Player -->
        <div class="video-box" id="videoBox">
            <video id="courseVideo" controls playsinline>
                <source id="videoSource" src="assets/aws_trial.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Keep Watching status -->
        <div class="keep-watching" id="watchStatus">Keep watching...</div>

        <!-- Return Button -->
        <button class="back-btn" id="backBtn">
            <i class="fa-solid fa-arrow-left"></i> Back to Cognix AI
        </button>

    </div>

    <!-- GSAP Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. URL Parameter Extraction
            const urlParams = new URLSearchParams(window.location.search);
            
            // Name (just in case we need it to resend back)
            let userName = urlParams.get('name') || localStorage.getItem('userName') || "User";
            if (userName.includes(" ")) {
                userName = userName.trim().split(" ")[0];
            }

            // Domain mapping
            const rawDomain = urlParams.get('domain') || localStorage.getItem('selectedCourse') || "AWS";
            
            // Convert short URL value to proper display string
            const displayNameMap = {
                "AI": "Artificial Intelligence (AI)",
                "Full Stack": "Full Stack Development",
                "AWS": "Amazon Web Services (AWS)",
                "HR": "Human Resources (HR)"
            };
            const displayDomain = displayNameMap[rawDomain] || rawDomain;

            const domainNameEl = document.getElementById("domainName");
            domainNameEl.innerText = displayDomain;

            // Domain to Video mapping
            const videoMap = {
                "AWS": "assets/aws_trial.mp4",
                "Full Stack": "assets/fullstack_trail.mp4",
                "UI/UX Design": "assets/ui_ux_trial.mp4",
                "AI": "assets/ai_trail.mp4",
                "Artificial Intelligence (AI)": "assets/ai_trail.mp4",
                "Artificial Intelligence": "assets/ai_trail.mp4",
                "Data Analytics": "assets/data_analtics_trial.mp4",
                "Cyber Security": "assets/cyber_security_trail.mp4",
                "Auto CAD": "assets/autocad_trail.mp4",
                "IoT & Robotics": "assets/iot_robotics_trail.mp4",
                "Embedded System": "assets/embedded_systeem_trail.mp4",
                "VLSI Design": "assets/vlsi_trial.mp4",
                "Digital Marketing": "assets/digital_marketing_trail.mp4",
                "HR": "assets/hr_trail.mp4"
            };

            // Elements
            const heading = document.getElementById("mainHeading");
            const videoBox = document.getElementById("videoBox");
            const videoElement = document.getElementById("courseVideo");
            const videoSource = document.getElementById("videoSource");
            const watchStatus = document.getElementById("watchStatus");
            const backBtn = document.getElementById("backBtn");

            // Apply specific video securely
            if (rawDomain && videoMap[rawDomain]) {
                videoSource.setAttribute("src", videoMap[rawDomain]);
            } else {
                console.warn(`No valid video mapping found for domain: ${rawDomain}. Falling back to AWS default.`);
                videoSource.setAttribute("src", "assets/aws_trial.mp4");
            }
            videoElement.load(); // necessary to apply DOM changes to <video>

            // Web Speech API - AI Voice Greeting
            const speakGreeting = () => {
                if ('speechSynthesis' in window) {
                    // Cancel any previous speech
                    window.speechSynthesis.cancel();
                    
                    const speechText = `Hello ${userName}. Welcome to Cognix AI. Ready for ${displayDomain}.`;
                    const utterance = new SpeechSynthesisUtterance(speechText);
                    
                    // Voice settings for professional AI feel
                    utterance.rate = 0.95;
                    utterance.pitch = 1.1; 
                    utterance.volume = 1;

                    // Try assigning a natural English voice
                    const voices = window.speechSynthesis.getVoices();
                    const aiVoice = voices.find(voice => 
                        voice.lang.includes('en') && 
                        (voice.name.includes('Google') || voice.name.includes('Natural') || voice.name.includes('Female'))
                    );
                    if (aiVoice) {
                        utterance.voice = aiVoice;
                    }
                    window.speechSynthesis.speak(utterance);
                }
            };

            // Chrome/Safari often load voices asynchronously
            if (window.speechSynthesis && window.speechSynthesis.getVoices().length === 0) {
                window.speechSynthesis.addEventListener('voiceschanged', speakGreeting, { once: true });
            } else {
                setTimeout(speakGreeting, 300);
            }

            // Base centering positioning for heading
            gsap.set(heading, { xPercent: -50, yPercent: -50 });

            // 2. Timeline Animations
            const tl = gsap.timeline();

            // Phase 1: Fancy Heading Appearance
            tl.to(heading, {
                duration: 2,
                opacity: 1,
                scale: 1.1,
                ease: "power2.out"
            })
            // Quick pulse effect
            .to(heading, {
                duration: 0.8,
                scale: 1,
                ease: "back.out(1.5)"
            })
            // Short Pause to read
            .to({}, { duration: 1 })
            // Phase 2: Move Heading to Top safely
            .to(heading, {
                duration: 1.5,
                top: "10%", /* Symmetrical safe positioning above the 25vh video line */
                scale: 0.65,
                yPercent: -50, /* Keep perfectly aligned naturally off its own new Y center */
                ease: "power3.inOut"
            }, "moveUp")

            // Phase 3: Reveal Video Box with slight zoom
            .set(videoBox, { display: "block" }, "moveUp+=0.5")
            .fromTo(videoBox, 
                { opacity: 0, y: 50, scale: 0.9 },
                { duration: 1.5, opacity: 1, y: 0, scale: 1, ease: "power3.out",
                    onComplete: () => {
                        // Start video automatically
                        videoElement.play().catch(e => console.log("Autoplay prevented:", e));
                    }
                }, "moveUp+=0.5")
            
            // Reveal Keep Watching text
            .set(watchStatus, { display: "block" }, "-=0.5")
            .to(watchStatus, { duration: 1, opacity: 1 });


            // 3. Video Completion Logic
            videoElement.addEventListener("ended", () => {
                // Save domain completion state
                localStorage.setItem('domainCompleted', 'true');

                const endTl = gsap.timeline();
                
                // Hide video and text
                endTl.to([videoBox, watchStatus], {
                    duration: 1,
                    opacity: 0,
                    scale: 0.9,
                    y: 20,
                    ease: "power2.in",
                    onComplete: () => {
                        videoBox.style.display = "none";
                        watchStatus.style.display = "none";
                    }
                })
                // Reveal Back Button
                .set(backBtn, { display: "flex", y: 50, opacity: 0 })
                .to(backBtn, {
                    duration: 0.8,
                    y: 0,
                    opacity: 1,
                    ease: "back.out(1.5)"
                });
            });

            // 4. Back Button Redirect
            backBtn.addEventListener('click', () => {
                // Return safely keeping name in URL
                localStorage.setItem('domainCompleted', 'true');
                window.location.href = `cognix-ai.html?name=${encodeURIComponent(userName)}&domain=${encodeURIComponent(rawDomain)}`;
            });

        });
    </script>
</body>
</html>
